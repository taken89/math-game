<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Game: เรียงตัวเลขมหาสนุก</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh;
            font-family: 'Prompt', sans-serif;
            background-color: #0f172a; 
            overflow: hidden;
        }
        #game-container {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; background: #000;
        }
        canvas {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100vw; min-height: 100vh;
            width: auto; height: auto;
            aspect-ratio: 16 / 9; z-index: 10;
        }
        video { display: none; }
        
        .screen-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 30; color: white; text-align: center;
        }
        #theme-select { display: none; background: rgba(248, 250, 252, 0.98); color: #333; z-index: 35; }
        
        .theme-btn {
            font-family: 'Prompt', sans-serif; font-size: 24px; font-weight: 700;
            padding: 20px 30px; margin: 15px; border-radius: 25px; border: none;
            cursor: pointer; transition: all 0.3s ease;
            width: 340px; box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-pastel { background: linear-gradient(135deg, #fce4ec, #f8bbd0); color: #880e4f; }
        .btn-scifi { background: linear-gradient(135deg, #1f2833, #0b0c10); color: #66fcf1; }
        .btn-nature { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); color: #1b5e20; }
        .btn-ocean { background: linear-gradient(135deg, #e0f7fa, #b2ebf2); color: #006064; }
        .btn-candy { background: linear-gradient(135deg, #fff3e0, #ffe0b2); color: #e65100; }
        .theme-btn:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 15px 25px rgba(0,0,0,0.2); }
        .theme-btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        #camera-warning {
            display: none; background: #e74c3c; color: white;
            padding: 15px 25px; font-size: 18px; font-weight: 600;
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 40;
            border-radius: 12px; box-shadow: 0 10px 25px rgba(231, 76, 60, 0.4);
        }
        
        .main-btn {
            font-family: 'Prompt', sans-serif; font-size: 28px; font-weight: 700;
            padding: 20px 60px; border-radius: 50px; border: none;
            background: linear-gradient(135deg, #00b4db, #0083b0); color: white; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 180, 219, 0.4); transition: all 0.3s ease; margin-top: 30px;
        }
        .main-btn:hover { background: linear-gradient(135deg, #00c6ff, #0072ff); transform: scale(1.05) translateY(-3px); }

        .control-btn {
            position: absolute; top: 20px; z-index: 20;
            background: rgba(255, 255, 255, 0.9); color: #333;
            border: none; border-radius: 50%; width: 60px; height: 60px;
            font-size: 30px; cursor: pointer; display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s;
            display: flex; justify-content: center; align-items: center;
        }
        #home-btn { left: 20px; }
        #home-btn:hover { transform: scale(1.1); background: #e74c3c; color: #fff; }
        
        #mute-btn { right: 20px; }
        #mute-btn:hover { transform: scale(1.1); background: #3498db; color: #fff; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="camera-warning">⚠️ ไม่สามารถเข้าถึงกล้องได้: ระบบจะใช้การสัมผัสหรือเมาส์แทน</div>
    <button id="home-btn" class="control-btn" onclick="location.reload()" title="กลับหน้าหลัก" style="display:none;">🏠</button>
    <button id="mute-btn" class="control-btn" onclick="toggleMusic()" title="เปิด/ปิดเพลง" style="display:none;">🔊</button>
    
    <div id="start-screen" class="screen-overlay">
        <h1 style="font-size: 70px; margin-bottom: 10px; color: #f1c40f; text-shadow: 0 6px 15px rgba(0,0,0,0.5);">🌟 เกมเรียงตัวเลขมหาสนุก 🌟</h1>
        <p style="font-size: 26px; margin-bottom: 40px; color: #cbd5e1; font-weight: 400;">ระบบควบคุมด้วยกล้อง AR และหน้าจอสัมผัส<br>พัฒนาทักษะกระบวนการคิดสำหรับทุกคน!</p>
        <button class="main-btn" onclick="goToThemeSelect()">เข้าสู่เกม</button>
        <p style="font-size: 16px; margin-top: 20px; color: #94a3b8;">(ระบบจะเข้าสู่โหมดเต็มหน้าจออัตโนมัติ)</p>
    </div>

    <div id="theme-select" class="screen-overlay">
        <h1 style="font-size: 50px; margin-bottom: 40px; color: #1e293b; font-weight: 800;">🎨 เลือกโลกที่หนูอยากไปสำรวจ! 🎨</h1>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 1000px;">
            <button class="theme-btn btn-pastel" onclick="startGame('pastel')">🦄 ดินแดนเวทมนตร์</button>
            <button class="theme-btn btn-scifi" onclick="startGame('scifi')">🚀 อวกาศและหุ่นยนต์</button>
            <button class="theme-btn btn-nature" onclick="startGame('nature')">⛺ แคมป์ปิ้งในป่าใหญ่</button>
            <button class="theme-btn btn-ocean" onclick="startGame('ocean')">🐠 โลกใต้ทะเลแสนสนุก</button>
            <button class="theme-btn btn-candy" onclick="startGame('candy')">🍭 เมืองขนมหวาน</button>
        </div>
    </div>

    <div id="game-over" class="screen-overlay" style="display: none; z-index: 50;">
        <h1 style="font-size: 80px; color: #f1c40f; text-shadow: 0 8px 20px rgba(0,0,0,0.6);" id="final-score-title">🎉 ยอดเยี่ยมมาก! 🎉</h1>
        <p style="font-size: 40px; color: #e2e8f0; font-weight: 700;" id="final-score-text">หนูทำคะแนนได้ทั้งหมด 0 คะแนน</p>
        <button class="main-btn" onclick="location.reload()">เล่นใหม่อีกครั้ง</button>
    </div>

    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas" width="1280" height="720"></canvas>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    const startScreen = document.getElementById('start-screen');
    const themeSelectScreen = document.getElementById('theme-select');
    const gameOverScreen = document.getElementById('game-over');
    const cameraWarning = document.getElementById('camera-warning');
    const homeBtn = document.getElementById('home-btn');
    const muteBtn = document.getElementById('mute-btn');

    const TOTAL_ROUNDS = 10;
    const NUM_BLOCKS = 8;
    let currentRound = 1;
    let score = 0;
    let sortMode = 0; 
    let blocks = [];
    let message = "พร้อมแล้ว!";
    let confirmCooldown = 0;
    let isVictory = false;

    let timeElapsed = 0;
    let timerInterval = null;

    let draggingIndex = -1;
    let hoverSlotIndex = -1; 
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let isMouseDown = false;
    let wasPinching = false; // สำหรับระบบ Hysteresis ความแม่นยำสูง

    let summaryHighlightIndex = -1; 
    let encouragementMessage = "";
    
    let floatingTexts = [];

    const btnLeft = { x: 20, y: 320, w: 140, h: 200 };
    const btnRight = { x: 1120, y: 320, w: 140, h: 200 };

    const themes = {
        pastel: { bg: "#fce4ec", block: "#f48fb1", text: "#880e4f", hover: "#f8bbd0", icon: "🌸", progressIcon: "🦄", particleType: "bubble", entityIcons: ["🦄", "🧚‍♀️", "✨"] },
        scifi: { bg: "#0b0c10", block: "#1f2833", text: "#66fcf1", hover: "#45a29e", icon: "🤖", progressIcon: "🚀", particleType: "star", entityIcons: ["🤖", "🚀", "🛸"] },
        nature: { bg: "#e8f5e9", block: "#81c784", text: "#1b5e20", hover: "#a5d6a7", icon: "🍃", progressIcon: "🦋", particleType: "leaf", entityIcons: ["🦋", "🐦", "🐝"] },
        ocean: { bg: "#e0f7fa", block: "#4dd0e1", text: "#006064", hover: "#80deea", icon: "🐚", progressIcon: "🐢", particleType: "water", entityIcons: ["🐠", "🐢", "🐙"] },
        candy: { bg: "#fff3e0", block: "#ffb74d", text: "#e65100", hover: "#ffcc80", icon: "🍬", progressIcon: "🍭", particleType: "candy", entityIcons: ["🍩", "🧁", "🍦"] }
    };
    let currentTheme = themes.pastel;

    let bgParticles = [];
    let confettiParticles = [];
    let activeEntities = [];

    function initBgParticles() {
        bgParticles = [];
        for(let i=0; i<60; i++) {
            bgParticles.push({
                x: Math.random() * 1280, y: Math.random() * 720,
                s: Math.random() * 15 + 5,
                vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 3,
                rot: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 5
            });
        }
    }

    function initEntities() {
        activeEntities = [];
        let icons = currentTheme.entityIcons;
        for(let i=0; i<3; i++) {
            activeEntities.push({
                icon: icons[i % icons.length],
                x: Math.random() * 1000 + 100,
                y: Math.random() * 200 + 150,
                vx: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 1.5 + 1),
                angle: Math.random() * Math.PI * 2,
                size: 70 + Math.random() * 40 
            });
        }
    }

    function drawAnimatedBg() {
        bgParticles.forEach(p => {
            if(currentTheme.particleType === 'star') {
                p.y += 4; if(p.y > 720) { p.y = -20; p.x = Math.random() * 1280; }
                canvasCtx.fillStyle = "rgba(102, 252, 241, 0.8)";
                canvasCtx.fillRect(p.x, p.y, p.s/3, p.s*2);
            } 
            else if(currentTheme.particleType === 'water' || currentTheme.particleType === 'bubble') {
                p.y -= 2; if(p.y < -20) { p.y = 740; p.x = Math.random() * 1280; }
                p.x += Math.sin(p.y / 50) * 1.5;
                canvasCtx.beginPath(); canvasCtx.arc(p.x, p.y, p.s, 0, Math.PI*2);
                canvasCtx.strokeStyle = currentTheme.particleType === 'water' ? "rgba(255,255,255,0.6)" : "rgba(244, 143, 177, 0.6)";
                canvasCtx.lineWidth = 2; canvasCtx.stroke();
            }
            else if(currentTheme.particleType === 'leaf' || currentTheme.particleType === 'candy') {
                p.y += 2; if(p.y > 720) { p.y = -20; p.x = Math.random() * 1280; }
                p.x += Math.sin(p.y / 30) * 2; p.rot += p.rotSpeed;
                canvasCtx.save();
                canvasCtx.translate(p.x, p.y); canvasCtx.rotate(p.rot * Math.PI / 180);
                canvasCtx.fillStyle = currentTheme.particleType === 'leaf' ? "rgba(27, 94, 32, 0.5)" : "rgba(255, 183, 77, 0.8)";
                if(currentTheme.particleType === 'leaf') {
                    canvasCtx.beginPath(); canvasCtx.ellipse(0, 0, p.s, p.s/2, 0, 0, Math.PI*2); canvasCtx.fill();
                } else {
                    canvasCtx.fillRect(-p.s/2, -p.s/2, p.s, p.s);
                }
                canvasCtx.restore();
            }
        });
    }

    function drawEntities() {
        activeEntities.forEach(ent => {
            ent.x += ent.vx; ent.angle += 0.03;
            let currentY = ent.y + Math.sin(ent.angle) * 20; 
            if(ent.x > 1280 + 100) ent.vx *= -1;
            else if (ent.x < -100) ent.vx *= -1;

            canvasCtx.save();
            canvasCtx.translate(ent.x, currentY);
            if(ent.vx < 0) canvasCtx.scale(-1, 1);
            canvasCtx.font = `${ent.size}px Arial`; canvasCtx.textAlign = "center"; canvasCtx.textBaseline = "middle";
            canvasCtx.shadowColor = "rgba(0,0,0,0.3)"; canvasCtx.shadowBlur = 10;
            canvasCtx.fillText(ent.icon, 0, 0);
            canvasCtx.restore();
        });
    }

    const synth = window.speechSynthesis;
    let audioCtx;
    let isMusicPlaying = true;
    let bgmInterval = null;
    let noteIndex = 0;

    const motivationalQuotes = ["อัจฉริยะมาก!", "เก่งที่สุดในโลก!", "หนูทำได้สุดยอด!", "เจ๋งเป้งไปเลย!", "เพอร์เฟกต์!"];

    const bgmScores = {
        pastel: { notes: [392.00, 440.00, 523.25, 659.25, 523.25, 440.00], speed: 450, type: 'sine', vol: 0.04 },
        scifi: { notes: [146.83, 146.83, 174.61, 146.83, 220.00, 146.83, 261.63, 146.83], speed: 220, type: 'sawtooth', vol: 0.02 },
        nature: { notes: [329.63, 392.00, 440.00, 523.25, 392.00], speed: 700, type: 'triangle', vol: 0.05 },
        ocean: { notes: [130.81, 196.00, 261.63, 311.13, 261.63, 196.00], speed: 900, type: 'sine', vol: 0.05 },
        candy: { notes: [523.25, 392.00, 659.25, 523.25, 783.99, 659.25], speed: 250, type: 'square', vol: 0.015 }
    };

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function toggleMusic() {
        isMusicPlaying = !isMusicPlaying;
        muteBtn.innerText = isMusicPlaying ? "🔊" : "🔇";
    }

    function startBGM(themeKey) {
        if(bgmInterval) clearInterval(bgmInterval);
        let music = bgmScores[themeKey];
        if(!music) return;
        noteIndex = 0;
        
        bgmInterval = setInterval(() => {
            if(isMusicPlaying && !synth.speaking && !isVictory) {
                playTone(music.notes[noteIndex], music.type, music.speed/1000 * 0.6, music.vol);
                noteIndex = (noteIndex + 1) % music.notes.length;
            }
        }, music.speed);
    }

    function speak(text, cancelOld = true) {
        if(cancelOld && synth.speaking) synth.cancel();
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'th-TH'; utterThis.rate = 0.95; 
        synth.speak(utterThis);
    }

    function playTone(freq, type, duration, vol=0.1) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function playPop() { playTone(600, 'sine', 0.1, 0.2); setTimeout(()=>playTone(800, 'sine', 0.1, 0.2), 50); }
    function playClick() { playTone(1200, 'square', 0.05, 0.05); }
    function playWrong() { playTone(200, 'sawtooth', 0.3, 0.1); }
    function playCombo() {
        playTone(659.25, 'square', 0.1, 0.1); 
        setTimeout(()=>playTone(880.00, 'square', 0.2, 0.15), 100);
    }
    function playVictory() { 
        playTone(523.25, 'square', 0.15, 0.2); 
        setTimeout(()=>playTone(523.25, 'square', 0.15, 0.2), 150);
        setTimeout(()=>playTone(523.25, 'square', 0.15, 0.2), 300);
        setTimeout(()=>playTone(659.25, 'square', 0.4, 0.2), 450); 
        setTimeout(()=>playTone(783.99, 'square', 0.6, 0.2), 850); 
    }

    function openFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) { elem.requestFullscreen(); } 
        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
        else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
    }

    function createConfetti() {
        confettiParticles = [];
        const colors = [currentTheme.block, currentTheme.text, "#ffffff", "#f1c40f", "#e74c3c", "#9b59b6", "#2ecc71"];
        for(let i=0; i<250; i++) {
            confettiParticles.push({
                x: canvasElement.width / 2, y: canvasElement.height / 2 + 100,
                vx: (Math.random() - 0.5) * 45, vy: (Math.random() - 1) * 40,
                size: Math.random() * 15 + 8,
                color: colors[Math.floor(Math.random() * colors.length)],
                rot: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 20,
                isStar: Math.random() > 0.7
            });
        }
    }

    function drawConfetti() {
        if(!isVictory || confettiParticles.length === 0) return;
        confettiParticles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += 1.2; 
            p.rot += p.rotSpeed;
            canvasCtx.save();
            canvasCtx.translate(p.x, p.y); canvasCtx.rotate(p.rot * Math.PI / 180);
            canvasCtx.fillStyle = p.color;
            if (p.isStar) {
                canvasCtx.beginPath();
                for (let j = 0; j < 5; j++) {
                    canvasCtx.lineTo(Math.cos((18 + j * 72) * Math.PI / 180) * p.size, -Math.sin((18 + j * 72) * Math.PI / 180) * p.size);
                    canvasCtx.lineTo(Math.cos((54 + j * 72) * Math.PI / 180) * (p.size/2), -Math.sin((54 + j * 72) * Math.PI / 180) * (p.size/2));
                }
                canvasCtx.closePath(); canvasCtx.fill();
            } else {
                canvasCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            }
            canvasCtx.restore();
        });
    }

    function addFloatingText(text, x, y, color) {
        floatingTexts.push({ text: text, x: x, y: y, color: color, alpha: 1.0, life: 60 });
    }

    function drawFloatingTexts() {
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let ft = floatingTexts[i];
            canvasCtx.save();
            canvasCtx.globalAlpha = ft.alpha;
            canvasCtx.fillStyle = ft.color;
            canvasCtx.font = "bold 50px Prompt";
            canvasCtx.textAlign = "center";
            canvasCtx.shadowColor = "rgba(0,0,0,0.8)";
            canvasCtx.shadowBlur = 10;
            canvasCtx.fillText(ft.text, ft.x, ft.y);
            canvasCtx.strokeStyle = "#fff"; canvasCtx.lineWidth = 2;
            canvasCtx.strokeText(ft.text, ft.x, ft.y);
            canvasCtx.restore();

            ft.y -= 2; 
            ft.life--;
            if(ft.life < 20) ft.alpha -= 0.05;
            if(ft.life <= 0) floatingTexts.splice(i, 1);
        }
    }

    function initRound() {
        isVictory = false; confettiParticles = [];
        summaryHighlightIndex = -1; encouragementMessage = "";
        
        timeElapsed = 0;
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => { timeElapsed++; }, 1000);

        sortMode = Math.random() < 0.5 ? 0 : 1;
        message = sortMode === 0 ? "เรียงลำดับจาก น้อย ไป มาก" : "เรียงลำดับจาก มาก ไป น้อย";
        speak(`ด่านที่ ${currentRound}. ${message}`);
        
        let maxNumber = 20; 
        if(currentRound >= 4 && currentRound <= 7) maxNumber = 50; 
        if(currentRound >= 8) maxNumber = 100; 

        let nums = new Set();
        while(nums.size < NUM_BLOCKS) { nums.add(Math.floor(Math.random() * maxNumber) + 1); }
        let numsArray = Array.from(nums).sort(() => Math.random() - 0.5);

        blocks = [];
        let startX = (1280 - (NUM_BLOCKS * 110)) / 2; 
        for(let i=0; i<NUM_BLOCKS; i++) {
            blocks.push({
                val: numsArray[i], slotX: startX + i * 110, slotY: 550,
                x: startX + i * 110, y: 550, w: 90, h: 120 
            });
        }
    }

    function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
    }

    function drawUI() {
        let trackX = 140, trackY = 25, trackW = 1000, trackH = 20;
        
        canvasCtx.fillStyle = "rgba(0, 0, 0, 0.4)";
        roundRect(canvasCtx, trackX, trackY, trackW, trackH, 10, true, false);
        
        let progressPercent = ((currentRound - 1) / TOTAL_ROUNDS);
        if(isVictory) progressPercent = (currentRound / TOTAL_ROUNDS); 
        
        let progressWidth = Math.max(20, progressPercent * trackW); 
        
        let barGrad = canvasCtx.createLinearGradient(trackX, trackY, trackX + progressWidth, trackY);
        barGrad.addColorStop(0, currentTheme.text);
        barGrad.addColorStop(1, currentTheme.hover);
        
        canvasCtx.fillStyle = barGrad;
        canvasCtx.shadowColor = currentTheme.hover; canvasCtx.shadowBlur = 10;
        roundRect(canvasCtx, trackX, trackY, progressWidth, trackH, 10, true, false);
        canvasCtx.shadowBlur = 0;

        canvasCtx.font = "30px Arial"; canvasCtx.textAlign = "center";
        canvasCtx.fillText("🏆", trackX + trackW + 20, trackY + 18);

        canvasCtx.font = "40px Arial";
        let charX = trackX + progressWidth - 10;
        canvasCtx.shadowColor = "rgba(0,0,0,0.5)"; canvasCtx.shadowBlur = 5;
        let charYOffset = Math.sin(Date.now() / 150) * 5;
        canvasCtx.fillText(currentTheme.progressIcon, charX, trackY + 15 + charYOffset);
        canvasCtx.shadowBlur = 0;


        let bannerX = 260, bannerY = 70, bannerW = 760, bannerH = 90;
        canvasCtx.shadowColor = "rgba(0,0,0,0.3)"; canvasCtx.shadowBlur = 15; canvasCtx.shadowOffsetY = 8;
        canvasCtx.fillStyle = "rgba(255, 255, 255, 0.85)";
        roundRect(canvasCtx, bannerX, bannerY, bannerW, bannerH, 30, true, false);
        canvasCtx.shadowBlur = 0; canvasCtx.shadowOffsetY = 0;
        
        canvasCtx.lineWidth = 5; canvasCtx.strokeStyle = currentTheme.block;
        roundRect(canvasCtx, bannerX, bannerY, bannerW, bannerH, 30, false, true);
        
        let grad = canvasCtx.createLinearGradient(bannerX, bannerY, bannerX + bannerW, bannerY + bannerH);
        grad.addColorStop(0, currentTheme.text); grad.addColorStop(1, currentTheme.hover);
        
        canvasCtx.fillStyle = grad; canvasCtx.font = "bold 40px Prompt"; canvasCtx.textAlign = "center";
        canvasCtx.fillText(`ด่านที่ ${currentRound}/${TOTAL_ROUNDS} : ${message}`, 640, 125);

        canvasCtx.shadowColor = "rgba(0,0,0,0.3)"; canvasCtx.shadowBlur = 10; canvasCtx.shadowOffsetY = 5;
        canvasCtx.fillStyle = "rgba(241, 196, 15, 0.9)";
        roundRect(canvasCtx, 20, 80, 220, 70, 20, true, false);
        canvasCtx.shadowBlur = 0; canvasCtx.shadowOffsetY = 0;
        canvasCtx.fillStyle = "#fff"; canvasCtx.font = "bold 36px Prompt"; canvasCtx.textAlign = "left";
        canvasCtx.fillText(`⭐ ${score}`, 40, 128);

        canvasCtx.shadowColor = "rgba(0,0,0,0.3)"; canvasCtx.shadowBlur = 10; canvasCtx.shadowOffsetY = 5;
        canvasCtx.fillStyle = isVictory ? "rgba(46, 204, 113, 0.9)" : "rgba(52, 152, 219, 0.9)"; 
        roundRect(canvasCtx, 1040, 80, 220, 70, 20, true, false);
        canvasCtx.shadowBlur = 0; canvasCtx.shadowOffsetY = 0;
        canvasCtx.fillStyle = "#fff"; canvasCtx.font = "bold 36px Prompt"; canvasCtx.textAlign = "left";
        canvasCtx.fillText(`⏱️ ${timeElapsed} วิ`, 1060, 128);

        drawConfirmButton(btnLeft, "กางมือ\nตอบ");
        drawConfirmButton(btnRight, "กางมือ\nตอบ");

        blocks.forEach((b, index) => {
            if (index === hoverSlotIndex && !isVictory) {
                canvasCtx.fillStyle = currentTheme.hover;
                roundRect(canvasCtx, b.slotX, b.slotY, b.w, b.h, 15, true, false);
            }
            canvasCtx.strokeStyle = index === hoverSlotIndex ? currentTheme.text : "rgba(255, 255, 255, 0.6)"; 
            canvasCtx.lineWidth = index === hoverSlotIndex ? 6 : 4;
            canvasCtx.setLineDash(index === hoverSlotIndex ? [] : [12, 12]);
            roundRect(canvasCtx, b.slotX, b.slotY, b.w, b.h, 20, false, true);
            canvasCtx.setLineDash([]);
        });

        for(let i=0; i<blocks.length; i++) {
            if(i !== draggingIndex) drawBlock(blocks[i], false, i);
        }
        if(draggingIndex !== -1) drawBlock(blocks[draggingIndex], true, draggingIndex);

        if(encouragementMessage !== "") {
            canvasCtx.fillStyle = "rgba(0, 0, 0, 0.7)";
            roundRect(canvasCtx, 240, 280, 800, 160, 40, true, false);
            
            canvasCtx.fillStyle = "#2ecc71"; 
            canvasCtx.font = "bold 65px Prompt"; canvasCtx.textAlign = "center";
            canvasCtx.shadowColor = "rgba(0,0,0,0.8)"; canvasCtx.shadowBlur = 15;
            canvasCtx.fillText(encouragementMessage, 640, 390);
            canvasCtx.strokeStyle = "#ffffff"; canvasCtx.lineWidth = 3;
            canvasCtx.strokeText(encouragementMessage, 640, 390);
            canvasCtx.shadowBlur = 0;
        }

        drawFloatingTexts();
        if(isVictory && encouragementMessage === "") drawConfetti();
    }

    function drawConfirmButton(btn, text) {
        canvasCtx.fillStyle = confirmCooldown > 0 ? "#94a3b8" : currentTheme.text;
        canvasCtx.shadowColor = "rgba(0,0,0,0.4)"; canvasCtx.shadowBlur = 10; canvasCtx.shadowOffsetY = 5;
        roundRect(canvasCtx, btn.x, btn.y, btn.w, btn.h, 25, true, false);
        canvasCtx.shadowBlur = 0; canvasCtx.shadowOffsetY = 0;
        
        canvasCtx.lineWidth = 5; canvasCtx.strokeStyle = "rgba(255,255,255,0.5)";
        roundRect(canvasCtx, btn.x + 5, btn.y + 5, btn.w - 10, btn.h - 10, 20, false, true);
        
        canvasCtx.fillStyle = "#fff"; canvasCtx.font = "bold 32px Prompt"; canvasCtx.textAlign = "center";
        let lines = text.split('\n');
        canvasCtx.fillText(lines[0], btn.x + btn.w/2, btn.y + 95);
        canvasCtx.fillText(lines[1], btn.x + btn.w/2, btn.y + 140);
    }

    function drawBlock(b, isDragging, index) {
        let isHighlighted = (index === summaryHighlightIndex);
        canvasCtx.fillStyle = isHighlighted ? "#f1c40f" : (isDragging ? currentTheme.hover : currentTheme.block);
        
        canvasCtx.shadowColor = isHighlighted ? "rgba(241, 196, 15, 0.8)" : "rgba(0,0,0,0.5)";
        canvasCtx.shadowBlur = isHighlighted ? 30 : (isDragging ? 25 : 10);
        canvasCtx.shadowOffsetY = isHighlighted ? 0 : (isDragging ? 15 : 6);
        roundRect(canvasCtx, b.x, b.y, b.w, b.h, 20, true, false);
        canvasCtx.shadowBlur = 0; canvasCtx.shadowOffsetY = 0;

        canvasCtx.lineWidth = 3; 
        canvasCtx.strokeStyle = isHighlighted ? "#ffffff" : "rgba(255,255,255,0.8)";
        roundRect(canvasCtx, b.x + 4, b.y + 4, b.w - 8, b.h - 8, 16, false, true);
        
        canvasCtx.font = "24px Arial"; canvasCtx.textAlign = "center";
        canvasCtx.fillText(isHighlighted ? "⭐" : currentTheme.icon, b.x + b.w/2, b.y + 35);
        
        canvasCtx.fillStyle = isHighlighted ? "#ffffff" : currentTheme.text; 
        canvasCtx.font = "bold 55px Prompt";
        canvasCtx.fillText(b.val, b.x + b.w/2, b.y + 95);
    }

    function startSummarySequence() {
        speak("คำตอบที่ถูกต้องคือ...", true);
        let baseDelay = 1500; 
        
        blocks.forEach((b, index) => {
            setTimeout(() => {
                summaryHighlightIndex = index; 
                playPop(); 
                speak(b.val.toString(), true); 
            }, baseDelay + (index * 1100)); 
        });

        let finishDelay = baseDelay + (NUM_BLOCKS * 1100) + 500;
        setTimeout(() => {
            summaryHighlightIndex = -1; 
            
            let randomQuote = motivationalQuotes[Math.floor(Math.random() * motivationalQuotes.length)];
            encouragementMessage = randomQuote + " ลุยข้อต่อไปเลย!";
            speak(encouragementMessage, true);
            
            setTimeout(() => {
                encouragementMessage = "";
                if(currentRound >= TOTAL_ROUNDS) {
                    gameOverScreen.style.display = "flex";
                    document.getElementById('final-score-text').innerText = `หนูทำคะแนนได้ทั้งหมด ${score} คะแนน`;
                    speak(`ยินดีด้วย เล่นจบครบทุกด่านแล้ว ทำคะแนนรวมได้ ${score} คะแนน เก่งมากๆ เลยครับ`, true);
                    homeBtn.style.display = "none";
                    muteBtn.style.display = "none";
                    if(bgmInterval) clearInterval(bgmInterval);
                } else {
                    currentRound++; initRound();
                }
            }, 3500);

        }, finishDelay);
    }

    function checkAnswer() {
        if(confirmCooldown > 0 || isVictory) return;
        let isCorrect = true;
        for(let i=0; i<blocks.length-1; i++) {
            if(sortMode === 0 && blocks[i].val > blocks[i+1].val) isCorrect = false;
            if(sortMode === 1 && blocks[i].val < blocks[i+1].val) isCorrect = false;
        }

        if(isCorrect) {
            isVictory = true; 
            if(timerInterval) clearInterval(timerInterval); 

            score += 100;
            addFloatingText("+100", 640, 360, "#f1c40f");

            let winSpeech = "ถูกต้อง! เก่งมาก ";
            if(timeElapsed <= 30) {
                let speedBonus = (30 - timeElapsed) * 5 + 50; 
                score += speedBonus;
                playCombo();
                setTimeout(() => {
                    addFloatingText(`⚡ สายฟ้าแลบ! +${speedBonus}`, 640, 430, "#2ecc71");
                }, 500);
                winSpeech += `หนูเร็วมาก ได้โบนัสสายฟ้าแลบเพิ่มอีก ${speedBonus} คะแนน`;
            }

            playVictory(); createConfetti(); 
            speak(winSpeech);

            setTimeout(startSummarySequence, 3500); 
        } else {
            playWrong(); speak("ยังไม่ถูกครับ ลองพยายามใหม่อีกนิดนะ");
            addFloatingText("❌ พยายามใหม่นะ", 640, 360, "#e74c3c");
            confirmCooldown = 60;
        }
    }

    function handleGrab(x, y, isGrabbing) {
        if(isVictory) return; 
        if (isGrabbing) {
            if (draggingIndex === -1) {
                if(confirmCooldown <= 0) {
                    if( (x > btnLeft.x && x < btnLeft.x + btnLeft.w && y > btnLeft.y && y < btnLeft.y + btnLeft.h) || 
                        (x > btnRight.x && x < btnRight.x + btnRight.w && y > btnRight.y && y < btnRight.y + btnRight.h) ) {
                        checkAnswer(); return;
                    }
                }
                for(let i=0; i<blocks.length; i++) {
                    let b = blocks[i];
                    if(x > b.x && x < b.x + b.w && y > b.y && y < b.y + b.h) {
                        draggingIndex = i; dragOffsetX = x - b.x; dragOffsetY = y - b.y;
                        playPop(); speak(b.val.toString(), true); 
                        addFloatingText("หยิบ!", b.x + b.w/2, b.y - 20, "#fff");
                        break;
                    }
                }
            } else {
                blocks[draggingIndex].x = x - dragOffsetX;
                blocks[draggingIndex].y = y - dragOffsetY;
                
                hoverSlotIndex = -1; let minDist = 100;
                let draggedB = blocks[draggingIndex];
                for(let i=0; i<blocks.length; i++) {
                    let dist = Math.hypot((draggedB.x + draggedB.w/2) - (blocks[i].slotX + blocks[i].w/2), 
                                          (draggedB.y + draggedB.h/2) - (blocks[i].slotY + blocks[i].h/2));
                    if(dist < minDist) { minDist = dist; hoverSlotIndex = i; }
                }
            }
        } else {
            if (draggingIndex !== -1) {
                if(hoverSlotIndex !== -1 && hoverSlotIndex !== draggingIndex) {
                    let tempVal = blocks[draggingIndex].val;
                    blocks[draggingIndex].val = blocks[hoverSlotIndex].val;
                    blocks[hoverSlotIndex].val = tempVal;
                }
                blocks[draggingIndex].x = blocks[draggingIndex].slotX; 
                blocks[draggingIndex].y = blocks[draggingIndex].slotY;
                playClick();
                addFloatingText("วาง", blocks[draggingIndex].x + blocks[draggingIndex].w/2, blocks[draggingIndex].y - 20, "#bdc3c7");
                
                draggingIndex = -1; hoverSlotIndex = -1;
            }
        }
    }

    function getMousePos(evt) {
        let rect = canvasElement.getBoundingClientRect();
        let scaleX = canvasElement.width / rect.width;
        let scaleY = canvasElement.height / rect.height;
        let clientX = evt.clientX || (evt.touches && evt.touches[0].clientX);
        let clientY = evt.clientY || (evt.touches && evt.touches[0].clientY);
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    canvasElement.addEventListener('mousedown', (e) => { let pos = getMousePos(e); isMouseDown = true; handleGrab(pos.x, pos.y, true); });
    canvasElement.addEventListener('mousemove', (e) => { if(isMouseDown) { let pos = getMousePos(e); handleGrab(pos.x, pos.y, true); } });
    window.addEventListener('mouseup', () => { isMouseDown = false; handleGrab(0, 0, false); });
    
    canvasElement.addEventListener('touchstart', (e) => { e.preventDefault(); let pos = getMousePos(e); isMouseDown = true; handleGrab(pos.x, pos.y, true); }, {passive: false});
    canvasElement.addEventListener('touchmove', (e) => { e.preventDefault(); if(isMouseDown) { let pos = getMousePos(e); handleGrab(pos.x, pos.y, true); } }, {passive: false});
    window.addEventListener('touchend', () => { isMouseDown = false; handleGrab(0, 0, false); });

    let lastImage = null;
    function onResults(results) {
        lastImage = results.image;
        canvasCtx.save();
        
        canvasCtx.fillStyle = currentTheme.bg;
        canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
        
        canvasCtx.globalAlpha = 0.55; 
        canvasCtx.translate(canvasElement.width, 0); canvasCtx.scale(-1, 1);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        
        // --- เริ่มต้นการวาดโครงกระดูกมือและจุดสัมผัส (Hand Landmarks) ---
        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // วาดเส้นเชื่อมต่อ (Connections)
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS,
                             {color: 'rgba(255, 255, 255, 0.5)', lineWidth: 3});
                
                // วาดจุดข้อต่อปกติ (Landmarks)
                drawLandmarks(canvasCtx, landmarks, 
                            {color: 'rgba(255, 255, 255, 0.8)', lineWidth: 1, radius: 4});
                
                // ไฮไลท์ปลายนิ้วโป้งและนิ้วชี้ให้เด่นชัด (จุดสำหรับหยิบ)
                drawLandmarks(canvasCtx, [landmarks[4], landmarks[8]], 
                            {color: '#f1c40f', lineWidth: 2, radius: 8});
            }
        }
        // --- สิ้นสุดการวาดโครงกระดูกมือ ---

        canvasCtx.restore();
        
        drawAnimatedBg();
        drawEntities(); 
        drawUI();

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            let hand = results.multiHandLandmarks[0];
            let thumb = { x: (1 - hand[4].x) * canvasElement.width, y: hand[4].y * canvasElement.height };
            let index = { x: (1 - hand[8].x) * canvasElement.width, y: hand[8].y * canvasElement.height };
            let palm = { x: (1 - hand[9].x) * canvasElement.width, y: hand[9].y * canvasElement.height };
            
            let pinchX = (thumb.x + index.x) / 2; let pinchY = (thumb.y + index.y) / 2;
            let pinchDist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
            
            // --- ระบบ Hysteresis กันมือสั่น/บล็อคร่วงหลุดมือ ---
            let isPinching = false;
            if (wasPinching) {
                isPinching = pinchDist < 60; // ถ้าจับอยู่ยอมให้อ้ามือได้นิดหน่อยกันสั่น
            } else {
                isPinching = pinchDist < 35; // ถ้ายังไม่จับต้องจีบนิ้วให้แคบจริงๆ ถึงจะติด
            }
            wasPinching = isPinching;

            let isOpenPalm = (hand[8].y < hand[6].y) && (hand[12].y < hand[10].y) && (hand[16].y < hand[14].y) && !isPinching;

            if(!isVictory) {
                // วาดเป้าเล็งตรงกลางระหว่างนิ้ว
                canvasCtx.beginPath(); canvasCtx.arc(pinchX, pinchY, 15, 0, 2 * Math.PI);
                canvasCtx.fillStyle = isPinching ? "rgba(46, 204, 113, 0.9)" : "rgba(255, 255, 255, 0.8)"; 
                canvasCtx.fill();
                canvasCtx.lineWidth = 4; canvasCtx.strokeStyle = isPinching ? "#27ae60" : "#ffffff"; canvasCtx.stroke();
            }

            handleGrab(pinchX, pinchY, isPinching);

            if(isOpenPalm && confirmCooldown <= 0 && draggingIndex === -1 && !isVictory) {
                if( (palm.x > btnLeft.x && palm.x < btnLeft.x + btnLeft.w && palm.y > btnLeft.y && palm.y < btnLeft.y + btnLeft.h) || 
                    (palm.x > btnRight.x && palm.x < btnRight.x + btnRight.w && palm.y > btnRight.y && palm.y < btnRight.y + btnRight.h) ) {
                    checkAnswer();
                }
            }
        } else if(!isMouseDown) {
            handleGrab(0, 0, false);
        }

        if(confirmCooldown > 0) confirmCooldown--;
    }

    function renderLoop() {
        if(!lastImage) {
            canvasCtx.fillStyle = currentTheme.bg;
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            drawAnimatedBg();
            drawEntities(); 
            drawUI();
        }
        requestAnimationFrame(renderLoop);
    }

    function goToThemeSelect() {
        openFullscreen(); 
        initAudio(); 
        startScreen.style.display = "none";
        themeSelectScreen.style.display = "flex";
    }

    function startGame(themeKey) {
        currentTheme = themes[themeKey];
        initBgParticles(); 
        initEntities(); 
        
        themeSelectScreen.style.display = "none";
        homeBtn.style.display = "flex"; 
        muteBtn.style.display = "flex"; 
        
        startBGM(themeKey); 
        initRound();
        renderLoop();
        
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        // ปรับแก้ค่าความมั่นใจสูงขึ้นให้จับแม่นขึ้น
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.85, minTrackingConfidence: 0.85 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        
        camera.start().catch((err) => {
            console.error("Camera Error:", err);
            cameraWarning.style.display = "block";
        });
    }
</script>
</body>
</html>
